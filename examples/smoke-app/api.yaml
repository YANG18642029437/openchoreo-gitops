apiVersion: v1
kind: ConfigMap
metadata:
  name: phase05-smoke-api-contract
  namespace: default
data:
  openapi.yaml: |
    openapi: 3.0.3
    info:
      title: Phase 05 smoke API
      version: 1.0.0
    paths:
      /healthz:
        get:
          responses:
            "200": {description: Healthy}
      /readyz:
        get:
          responses:
            "200": {description: Database ready}
      /api/db:
        get:
          responses:
            "200": {description: Database round trip succeeded}

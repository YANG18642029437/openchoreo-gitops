apiVersion: openchoreo.dev/v1alpha1
kind: ClusterComponentType
metadata:
  name: deployment/service
  annotations:
    openchoreo.dev/description: Phase 05 HTTP service with resource dependency wiring
spec:
  workloadType: deployment
  validations:
    - rule: "${size(workload.endpoints) > 0}"
      message: Service components must expose at least one endpoint
  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        replicas:
          type: integer
          default: 1
          minimum: 1
        imagePullPolicy:
          type: string
          default: IfNotPresent
          enum: [Always, IfNotPresent, Never]
  resources:
    - id: deployment
      readyWhen: "${applied.deployment.status.readyReplicas == applied.deployment.status.replicas && applied.deployment.status.replicas > 0}"
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: ${environmentConfigs.replicas}
          selector:
            matchLabels: ${metadata.podSelectors}
          template:
            metadata:
              labels: ${metadata.podSelectors}
              annotations:
                prometheus.io/scrape: "true"
                prometheus.io/path: /metrics
                prometheus.io/port: "8080"
            spec:
              containers:
                - name: main
                  image: ${workload.container.image}
                  imagePullPolicy: ${environmentConfigs.imagePullPolicy}
                  command: |
                    ${has(workload.container.command) ? workload.container.command : oc_omit()}
                  args: |
                    ${has(workload.container.args) ? workload.container.args : oc_omit()}
                  env: |
                    ${dependencies.toContainerEnvs() + [{"name": "OPENCHOREO_ENVIRONMENT", "value": metadata.environmentName}]}
                  envFrom: ${configurations.toContainerEnvFrom()}
                  volumeMounts: ${configurations.toContainerVolumeMounts() + dependencies.toContainerVolumeMounts()}
                  ports:
                    - name: http
                      containerPort: 8080
                  resources:
                    requests:
                      cpu: 25m
                      memory: 64Mi
                    limits:
                      cpu: 250m
                      memory: 256Mi
              volumes: ${configurations.toVolumes() + dependencies.toVolumes()}
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.componentName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          type: ClusterIP
          selector: ${metadata.podSelectors}
          ports: ${workload.toServicePorts()}
    - id: httproute-external
      forEach: '${workload.endpoints.transformMap(name, ep, "external" in ep.visibility && ep.type == "HTTP", ep)}'
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${oc_generate_name(metadata.componentName, endpoint.key)}
          namespace: ${metadata.namespace}
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint.key, "openchoreo.dev/endpoint-visibility": "external"})}'
        spec:
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
          hostnames: |
            ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, metadata.environmentName + "-" + metadata.componentNamespace + "." + h)}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /${metadata.componentName}-${endpoint.key}
              filters:
                - type: URLRewrite
                  urlRewrite:
                    path:
                      type: ReplacePrefixMatch
                      replacePrefixMatch: '${endpoint.value.?basePath.orValue("/")}'
              backendRefs:
                - name: ${metadata.componentName}
                  port: ${endpoint.value.port}

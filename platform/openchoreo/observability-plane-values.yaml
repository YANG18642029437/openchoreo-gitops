observer:
  controlPlaneApiUrl: http://openchoreo-api.openchoreo-control-plane.svc.cluster.local:8080
  secretName: observer-secret
  openSearchSecretName: opensearch-admin-credentials
  cors:
    allowedOrigins:
      - http://openchoreo.home.arpa
  http:
    hostnames:
      - observer.openchoreo.home.arpa
  extraEnvs:
    - name: OBSERVER_BASE_URL
      value: http://observer.openchoreo.home.arpa
    - name: OPENSEARCH_ADDRESS
      value: https://opensearch:9200
    - name: PROMETHEUS_ADDRESS
      value: http://openchoreo-observability-prometheus:9091
    - name: PROMETHEUS_TIMEOUT
      value: 30s
    - name: AUTHZ_TIMEOUT
      value: 30s

clusterAgent:
  planeID: default
  serverUrl: wss://cluster-gateway.openchoreo-control-plane.svc.cluster.local:8443/ws
  replicas: 1
  podDisruptionBudget:
    enabled: false

gateway:
  infrastructure:
    annotations:
      metallb.io/loadBalancerIPs: 192.168.2.155
  tls:
    enabled: false

security:
  oidc:
    issuer: http://thunder.openchoreo.home.arpa
    jwksUrl: http://thunder-service.thunder.svc.cluster.local:8090/oauth2/jwks
    tokenUrl: http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token
    authServerBaseUrl: http://thunder.openchoreo.home.arpa

rca:
  enabled: false

finOpsAgent:
  enabled: false

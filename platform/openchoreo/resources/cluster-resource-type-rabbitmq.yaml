apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: rabbitmq
  annotations:
    openchoreo.dev/display-name: RabbitMQ
    openchoreo.dev/description: Single-replica RabbitMQ managed by the RabbitMQ Cluster Operator
spec:
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        replicas:
          type: integer
          default: 1
          minimum: 1
          maximum: 1
        storageClass:
          type: string
          default: local-path
        storageGiB:
          type: integer
          default: 10
          minimum: 10
          maximum: 100
  retainPolicy: Retain
  outputs:
    - name: host
      value: "${metadata.resourceName}.${metadata.namespace}.svc.cluster.local"
    - name: port
      value: "5672"
    - name: secretName
      value: "${metadata.resourceName}-default-user"
    - name: username
      secretKeyRef:
        name: "${metadata.resourceName}-default-user"
        key: username
    - name: password
      secretKeyRef:
        name: "${metadata.resourceName}-default-user"
        key: password
  resources:
    - id: rabbitmq
      template:
        apiVersion: rabbitmq.com/v1beta1
        kind: RabbitmqCluster
        metadata:
          name: ${metadata.resourceName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: ${parameters.replicas}
          image: rabbitmq:4.2.6-management
          persistence:
            storageClassName: ${parameters.storageClass}
            storage: "${string(parameters.storageGiB) + 'Gi'}"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
    - id: readiness
      readyWhen: '${has(applied.readiness.status.succeeded) && applied.readiness.status.succeeded > 0}'
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${metadata.name}-ready
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          activeDeadlineSeconds: 600
          backoffLimit: 1
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${metadata.resourceName}-ready
            spec:
              restartPolicy: OnFailure
              containers:
                - name: check-amqp
                  image: rabbitmq:4.2.6-management
                  command:
                    - /bin/bash
                    - -ec
                  args:
                    - |
                      until timeout 2 bash -c "</dev/tcp/${metadata.resourceName}/5672"; do sleep 2; done

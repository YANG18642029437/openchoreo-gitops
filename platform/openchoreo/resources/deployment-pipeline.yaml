apiVersion: openchoreo.dev/v1alpha1
kind: DeploymentPipeline
metadata:
  name: default
  namespace: default
  annotations:
    openchoreo.dev/display-name: Default Pipeline
    openchoreo.dev/description: Development to staging to production promotion path
  labels:
    openchoreo.dev/name: default
spec:
  promotionPaths:
    - sourceEnvironmentRef:
        name: development
      targetEnvironmentRefs:
        - name: staging
    - sourceEnvironmentRef:
        name: staging
      targetEnvironmentRefs:
        - name: production

apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: redis
  annotations:
    openchoreo.dev/display-name: Redis
    openchoreo.dev/description: Password-protected single-instance Redis with retained AOF storage
spec:
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - secretPath
      properties:
        secretPath:
          type: string
          minLength: 1
        storageClass:
          type: string
          default: local-path
        storageGiB:
          type: integer
          default: 10
          minimum: 10
          maximum: 100
        langfuseDatabase:
          type: integer
          default: 1
          minimum: 1
          maximum: 15
  retainPolicy: Retain
  outputs:
    - name: host
      value: "${metadata.resourceName}.${metadata.namespace}.svc.cluster.local"
    - name: port
      value: "6379"
    - name: secretName
      value: "${metadata.resourceName}-creds"
    - name: password
      secretKeyRef:
        name: "${metadata.resourceName}-creds"
        key: password
    - name: langfuseDatabase
      value: "${string(parameters.langfuseDatabase)}"
    - name: langfusePassword
      secretKeyRef:
        name: "${metadata.resourceName}-creds"
        key: langfuse_password
  resources:
    - id: credentials
      readyWhen: '${has(applied.credentials.status.conditions) && applied.credentials.status.conditions.exists(c, c.type == "Ready" && c.status == "True")}'
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${metadata.resourceName}-creds
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          secretStoreRef:
            kind: ClusterSecretStore
            name: openbao
          target:
            name: ${metadata.resourceName}-creds
            creationPolicy: Owner
            template:
              type: Opaque
              data:
                password: "{{ .password }}"
                langfuse_password: "{{ .langfuse_password }}"
                redis.conf: |
                  bind 0.0.0.0
                  protected-mode yes
                  port 6379
                  dir /data
                  appendonly yes
                  appendfsync everysec
                  user default on >{{ .password }} ~* +@all
                  user langfuse on >{{ .langfuse_password }} ~* +@all
          data:
            - secretKey: password
              remoteRef:
                key: ${parameters.secretPath}
                property: password
            - secretKey: langfuse_password
              remoteRef:
                key: ${parameters.secretPath}
                property: langfuse_password
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.resourceName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          selector:
            app.kubernetes.io/name: ${metadata.resourceName}
          ports:
            - name: redis
              port: 6379
              targetPort: redis
    - id: redis
      readyWhen: '${has(applied.redis.status.readyReplicas) && applied.redis.status.readyReplicas == 1}'
      template:
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: ${metadata.resourceName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          serviceName: ${metadata.resourceName}
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: ${metadata.resourceName}
          template:
            metadata:
              labels:
                app.kubernetes.io/name: ${metadata.resourceName}
            spec:
              securityContext:
                fsGroup: 999
                fsGroupChangePolicy: OnRootMismatch
              containers:
                - name: redis
                  image: redis:8.2.7-alpine
                  command:
                    - redis-server
                    - /etc/redis/redis.conf
                  env:
                    - name: REDISCLI_AUTH
                      valueFrom:
                        secretKeyRef:
                          name: ${metadata.resourceName}-creds
                          key: password
                  ports:
                    - name: redis
                      containerPort: 6379
                  readinessProbe:
                    exec:
                      command:
                        - sh
                        - -ec
                        - test "$(redis-cli ping)" = PONG
                    initialDelaySeconds: 5
                    periodSeconds: 5
                  livenessProbe:
                    exec:
                      command:
                        - sh
                        - -ec
                        - test "$(redis-cli ping)" = PONG
                    initialDelaySeconds: 15
                    periodSeconds: 10
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 1Gi
                  volumeMounts:
                    - name: data
                      mountPath: /data
                    - name: config
                      mountPath: /etc/redis
                      readOnly: true
              volumes:
                - name: config
                  secret:
                    secretName: ${metadata.resourceName}-creds
                    items:
                      - key: redis.conf
                        path: redis.conf
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                accessModes:
                  - ReadWriteOnce
                storageClassName: ${parameters.storageClass}
                resources:
                  requests:
                    storage: "${string(parameters.storageGiB) + 'Gi'}"

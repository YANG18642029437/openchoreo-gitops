apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xpostgresqls.database.openchoreo.io
spec:
  group: database.openchoreo.io
  scope: Namespaced
  names:
    kind: XPostgreSQL
    plural: xpostgresqls
  defaultCompositionRef:
    name: xpostgresqls.database.openchoreo.io
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    environment:
                      type: string
                      enum:
                        - development
                        - staging
                        - production
                    storageGiB:
                      type: integer
                      minimum: 10
                      maximum: 100
                    instances:
                      type: integer
                      minimum: 1
                      maximum: 3
                    databaseName:
                      type: string
                      minLength: 1
                      maxLength: 63
                      pattern: ^[a-z][a-z0-9_]*$
                  required:
                    - environment
                    - databaseName
              required:
                - parameters
            status:
              type: object
              properties:
                ready:
                  type: boolean
                host:
                  type: string
                port:
                  type: integer
                secretName:
                  type: string

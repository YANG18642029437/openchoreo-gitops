apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: thunder-bootstrap-secrets
  namespace: thunder
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: thunder-bootstrap-secrets
    creationPolicy: Owner
  data:
    - secretKey: THUNDER_ADMIN_PASSWORD
      remoteRef: {key: thunder, property: admin_password}
    - secretKey: THUNDER_DEVELOPER_PASSWORD
      remoteRef: {key: thunder, property: developer_password}
    - secretKey: THUNDER_PLATFORM_ENGINEER_PASSWORD
      remoteRef: {key: thunder, property: platform_engineer_password}
    - secretKey: THUNDER_SRE_PASSWORD
      remoteRef: {key: thunder, property: sre_password}
    - secretKey: BACKSTAGE_CLIENT_SECRET
      remoteRef: {key: thunder, property: backstage_client_secret}
    - secretKey: DEFAULT_APP_CLIENT_SECRET
      remoteRef: {key: thunder, property: default_app_client_secret}
    - secretKey: RCA_AGENT_CLIENT_SECRET
      remoteRef: {key: thunder, property: rca_agent_client_secret}
    - secretKey: SYSTEM_APP_CLIENT_SECRET
      remoteRef: {key: thunder, property: system_app_client_secret}
    - secretKey: SERVICE_MCP_CLIENT_SECRET
      remoteRef: {key: thunder, property: service_mcp_client_secret}
    - secretKey: WORKLOAD_PUBLISHER_CLIENT_SECRET
      remoteRef: {key: thunder, property: workload_publisher_client_secret}
    - secretKey: OBSERVER_READER_CLIENT_SECRET
      remoteRef: {key: thunder, property: observer_reader_client_secret}
    - secretKey: FINOPS_AGENT_CLIENT_SECRET
      remoteRef: {key: thunder, property: finops_agent_client_secret}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-secrets
  namespace: openchoreo-control-plane
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: backstage-secrets
    creationPolicy: Owner
  data:
    - secretKey: backend-secret
      remoteRef: {key: thunder, property: backstage_backend_secret}
    - secretKey: client-secret
      remoteRef: {key: thunder, property: backstage_client_secret}
    - secretKey: jenkins-api-key
      remoteRef: {key: thunder, property: backstage_backend_secret}

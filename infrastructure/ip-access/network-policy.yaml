apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ip-access-nginx
  namespace: platform-access
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ip-access-nginx
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - { protocol: TCP, port: 8441 }
        - { protocol: TCP, port: 8442 }
        - { protocol: TCP, port: 8443 }
        - { protocol: TCP, port: 8444 }
        - { protocol: TCP, port: 8445 }
        - { protocol: TCP, port: 8446 }
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - argocd
                  - ingress-nginx
                  - openchoreo-control-plane
                  - openchoreo-observability-plane
      ports:
        - { protocol: TCP, port: 80 }
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 8200 }

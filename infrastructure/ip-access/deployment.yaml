apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip-access-nginx
  namespace: platform-access
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ip-access-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ip-access-nginx
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: ip-access-nginx
              topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: harbor.openchoreo.home.arpa/openchoreo/ip-access-nginx@sha256:f7d0d0f2ebc0486dc110278672b9073f7fd641e58376b112b0c8865cf36d2e36
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - { name: argocd, containerPort: 8441 }
            - { name: harbor, containerPort: 8442 }
            - { name: openbao, containerPort: 8443 }
            - { name: openchoreo, containerPort: 8444 }
            - { name: observer, containerPort: 8445 }
            - { name: thunder, containerPort: 8446 }
          readinessProbe:
            tcpSocket:
              port: argocd
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: argocd
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: ip-access-nginx
        - name: tls
          secret:
            secretName: ip-access-tls
        - name: temporary
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-thunder
  annotations:
    argocd.argoproj.io/sync-wave: "1"
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.2.183
  share: /shared
  mountPermissions: "0777"
mountOptions:
  - nfsvers=4.1
  - hard
  - timeo=600
  - retrans=2
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true

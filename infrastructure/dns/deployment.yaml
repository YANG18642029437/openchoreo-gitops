apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-dns
  namespace: homelab-dns
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: homelab-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homelab-dns
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: homelab-dns
      containers:
        - name: coredns
          image: rancher/mirrored-coredns-coredns:1.14.3
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: health
              containerPort: 8080
            - name: ready
              containerPort: 8181
          readinessProbe:
            httpGet:
              path: /ready
              port: ready
          livenessProbe:
            httpGet:
              path: /health
              port: health
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: [NET_BIND_SERVICE]
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: homelab-dns

apiVersion: v1
kind: Service
metadata:
  name: homelab-dns
  namespace: homelab-dns
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.2.157
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: homelab-dns
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP

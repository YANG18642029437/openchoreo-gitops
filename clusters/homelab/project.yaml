apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab-platform
  namespace: argocd
spec:
  description: OpenChoreo homelab platform components managed by Argo CD
  sourceRepos:
    - https://github.com/YANG18642029437/openchoreo-gitops.git
    - https://metallb.github.io/metallb
    - https://kubernetes.github.io/ingress-nginx
    - https://charts.jetstack.io
    - https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
    - https://openbao.github.io/openbao-helm
    - https://charts.external-secrets.io
    - https://helm.goharbor.io
    - https://github.com/kubernetes-sigs/gateway-api.git
    - cr.kgateway.dev/kgateway-dev/charts
    - ghcr.io/asgardeo/helm-charts
    - ghcr.io/openchoreo/helm-charts
    - https://charts.crossplane.io/stable
    - ghcr.io/cloudnative-pg/charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: storage.k8s.io
      kind: StorageClass
    - group: storage.k8s.io
      kind: CSIDriver
    - group: gateway.networking.k8s.io
      kind: GatewayClass
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: external-secrets.io
      kind: ClusterSecretStore
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: networking.k8s.io
      kind: IngressClass
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: apiregistration.k8s.io
      kind: APIService
    - group: openchoreo.dev
      kind: ClusterAuthzRole
    - group: openchoreo.dev
      kind: ClusterAuthzRoleBinding
    - group: apiextensions.crossplane.io
      kind: CompositeResourceDefinition
    - group: apiextensions.crossplane.io
      kind: Composition
    - group: pkg.crossplane.io
      kind: Function
    - group: openchoreo.dev
      kind: ClusterResourceType
    - group: openchoreo.dev
      kind: ClusterComponentType
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

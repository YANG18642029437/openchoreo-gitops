apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-platform-control-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "70"
spec:
  project: homelab-platform
  source:
    repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
    targetRevision: main
    path: platform/openchoreo/agent-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

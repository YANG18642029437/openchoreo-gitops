apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openchoreo-workflow-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: homelab-platform
  sources:
    - repoURL: ghcr.io/openchoreo/helm-charts
      chart: openchoreo-workflow-plane
      targetRevision: 1.1.2
      helm:
        releaseName: openchoreo-workflow-plane
        valueFiles:
          - $values/platform/openchoreo/workflow-plane-values.yaml
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: main
      path: platform/openchoreo/workflow-runtime
  destination:
    server: https://kubernetes.default.svc
    namespace: openchoreo-workflow-plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openchoreo-workflow-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: homelab-platform
  sources:
    - repoURL: ghcr.io/openchoreo/helm-charts
      chart: openchoreo-workflow-plane
      targetRevision: 1.1.2
      helm:
        releaseName: openchoreo-workflow-plane
        valueFiles:
          - $values/platform/openchoreo/workflow-plane-values.yaml
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: codex/phase04-gitops
      ref: values
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: codex/phase04-gitops
      path: platform/openchoreo/workflow-runtime
  destination:
    server: https://kubernetes.default.svc
    namespace: openchoreo-workflow-plane
  # The API server owns normalized/defaulted CRD fields. Ignore only those
  # managed fields so Argo still detects chart or operator changes.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      managedFieldsManagers:
        - kube-apiserver
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

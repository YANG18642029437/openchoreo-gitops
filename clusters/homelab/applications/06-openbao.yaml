apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: homelab-platform
  sources:
    - repoURL: https://openbao.github.io/openbao-helm
      chart: openbao
      targetRevision: 0.25.6
      helm:
        releaseName: openbao
        valueFiles:
          - $values/infrastructure/openbao/values.yaml
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: codex/phase04-gitops
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openbao
  # The injector generates its serving certificate and writes the CA bundle
  # back to this webhook at runtime. Preserve that security material while
  # continuing to reconcile every other field from Git.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: openbao-agent-injector-cfg
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true

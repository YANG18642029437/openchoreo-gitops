apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-logs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  project: homelab-platform
  sources:
    - repoURL: ghcr.io/openchoreo/helm-charts
      chart: observability-logs-opensearch
      targetRevision: 0.4.1
      helm:
        releaseName: observability-logs-opensearch
        valueFiles:
          - $values/platform/observability/values-logs.yaml
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: codex/phase04-gitops
      ref: values
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: codex/phase04-gitops
      path: platform/openchoreo/observability-runtime
  destination:
    server: https://kubernetes.default.svc
    namespace: openchoreo-observability-plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

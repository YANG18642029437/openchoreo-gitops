apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: thunder-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: homelab-platform
  source:
    repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
    targetRevision: main
    path: platform/thunder-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: thunder
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

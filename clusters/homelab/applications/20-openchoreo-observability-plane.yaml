apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openchoreo-observability-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: homelab-platform
  sources:
    - repoURL: ghcr.io/openchoreo/helm-charts
      chart: openchoreo-observability-plane
      targetRevision: 1.1.2
      helm:
        releaseName: openchoreo-observability-plane
        valueFiles:
          - $values/platform/openchoreo/observability-plane-values.yaml
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openchoreo-observability-plane
  # The chart omits storageClassName and Kubernetes fills in the cluster
  # default. Ignore only that immutable API-defaulted field on this PVC.
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      name: observer-alerts-data
      namespace: openchoreo-observability-plane
      jsonPointers:
        - /spec/storageClassName
    # Gateway API admission fills these semantic defaults after Helm renders
    # the route. Ignore only the default values, not the routing targets.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: observer
      namespace: openchoreo-observability-plane
      jqPathExpressions:
        - '.spec.parentRefs[]?.group | select(. == "gateway.networking.k8s.io")'
        - '.spec.parentRefs[]?.kind | select(. == "Gateway")'
        - '.spec.rules[]?.backendRefs[]?.group | select(. == "")'
        - '.spec.rules[]?.backendRefs[]?.kind | select(. == "Service")'
        - '.spec.rules[]?.backendRefs[]?.weight | select(. == 1)'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openchoreo-capabilities
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "75"
spec:
  project: homelab-platform
  source:
    repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
    targetRevision: main
    path: platform/openchoreo/capabilities
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

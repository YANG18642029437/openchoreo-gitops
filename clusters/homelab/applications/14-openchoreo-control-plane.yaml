apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openchoreo-control-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: homelab-platform
  sources:
    - repoURL: ghcr.io/openchoreo/helm-charts
      chart: openchoreo-control-plane
      targetRevision: 1.1.2
      helm:
        releaseName: openchoreo-control-plane
        valueFiles:
          - $values/platform/openchoreo/control-plane-values.yaml
    - repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
      targetRevision: codex/phase04-gitops
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: openchoreo-control-plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

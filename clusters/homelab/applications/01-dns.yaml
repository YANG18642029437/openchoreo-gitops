apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: homelab-platform
  source:
    repoURL: https://github.com/YANG18642029437/openchoreo-gitops.git
    targetRevision: main
    path: infrastructure/dns
  destination:
    server: https://kubernetes.default.svc
    namespace: homelab-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
